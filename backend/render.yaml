services:
  - type: web
    name: qualipharma-backend
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: EMBEDDING_DIM
        value: "384"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "120"
      - key: ADMIN_KEY
        sync: false
